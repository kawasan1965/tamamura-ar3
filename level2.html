<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たまむらふぃーるど - レベル2ボス戦</title>
    <style>
        :root { --accent: #ef4444; --yellow: #facc15; --blue: #3b82f6; --green: #10b981; --purple: #a855f7; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; font-family: sans-serif; background: #000; color: #fff; overflow: hidden; }
        
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 2; pointer-events: none; }

        .main-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; z-index: 5;
        }

        .hud { width: 100%; display: flex; justify-content: space-between; padding: 15px; }
        .hud-card { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; border: 2px solid #ef4444; backdrop-filter: blur(4px); }
        #timer-text { color: #f87171; font-size: 14px; }

        .arena { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; min-height: 0; }
        
        #monsterCanvas { 
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            width: 60vw; height: 60vw; max-width: 220px; max-height: 220px;
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.7));
            margin-top: 50px; 
            animation: bossDynamic 4s infinite ease-in-out; 
        }
        
        @keyframes bossDynamic { 
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(35px, 15px) scale(1.02); }
            50% { transform: translate(0, 30px) scale(1.05); }
            75% { transform: translate(-35px, 15px) scale(1.02); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .limit-bar-frame { width: 240px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; margin-top: 15px; overflow: hidden; border: 1px solid black; }
        #limit-bar { width: 100%; height: 100%; background: #34d399; transition: width 0.1s linear; }

        .message-board { width: 100%; display: flex; justify-content: center; padding: 5px 15px; }
        #instruction { 
            background: rgba(0,0,0,0.9); padding: 12px 15px; border-radius: 20px; 
            font-size: 15px; font-weight: bold; text-align: center; width: 100%; max-width: 340px;
            border: 2px solid #ef4444; backdrop-filter: blur(4px); color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .controls { 
            width: 100%; background: rgba(15, 23, 42, 0.95); padding: 15px 15px 35px 15px; 
            border-radius: 24px 24px 0 0; display: flex; flex-direction: column; gap: 12px; 
            border-top: 2px solid #ef4444;
        }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .abc-btn { background: #1e293b; color: #64748b; border: 2px solid #334155; padding: 16px 0; font-size: 24px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.1s; }
        .abc-btn.highlight1 { background: #2563eb !important; color: white !important; border-color: #60a5fa !important; box-shadow: 0 0 10px #2563eb; }
        .abc-btn.highlight2 { background: #b91c1c !important; color: white !important; border-color: #f87171 !important; box-shadow: 0 0 10px #b91c1c; }
        
        .btn-d { width: 100%; background: linear-gradient(135deg, #475569, #334155); border: none; padding: 18px 0; color: #94a3b8; font-size: 22px; font-weight: bold; border-radius: 15px; box-shadow: 0 4px #1e293b; transition: all 0.1s; }
        .btn-d.ready { background: linear-gradient(135deg, #ef4444, #b91c1c) !important; color: white !important; box-shadow: 0 4px #7f1d1d, 0 0 15px #ef4444 !important; cursor: pointer; }
        .btn-d:active { transform: translateY(2px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 30px; text-align: center; }
        .action-btn { background: #ef4444; color: white; border: none; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 80%; max-width: 280px; box-shadow: 0 4px #991b1b; }
        
        .shake { animation: shakeL2 0.1s linear infinite alternate; }
        @keyframes shakeL2 { from { transform: translate(-8px, 20px); } to { transform: translate(8px, 30px); } }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <div id="flash"></div>

    <div id="qrCheckOverlay" class="overlay">
        <h2 style="font-size:28px; margin-bottom:20px; color:#ef4444;">⚠️ BOSS WARNING ⚠️</h2>
        <p style="line-height:1.6; margin-bottom:30px; color:#cbd5e1;">たまむら古文書の封印が解かれました。<br>極めて危険な「レベル2守護獣」を検知！</p>
        <button class="action-btn" onclick="startL2Game()">防衛戦を開始！</button>
    </div>

    <div class="main-wrapper" id="mainUi" style="display:none;">
        <div class="hud">
            <div class="hud-card">LEVEL 2 (究極)</div>
            <div class="hud-card" id="timer-card">作戦時間: <span id="timer-text">60.0</span>秒</div>
            <div class="hud-card">BOSS HP: <span id="hp-val">20</span> / 20</div>
        </div>

        <div class="arena">
            <canvas id="monsterCanvas" width="32" height="32"></canvas>
            <div class="limit-bar-frame"><div id="limit-bar"></div></div>
        </div>

        <div class="message-board">
            <div id="instruction">コマンドを入力せよ！</div>
        </div>

        <div class="controls">
            <div class="grid-3">
                <button id="btn-a" class="abc-btn" onclick="tapAbc('A')">A</button>
                <button id="btn-b" class="abc-btn" onclick="tapAbc('B')">B</button>
                <button id="btn-c" class="abc-btn" onclick="tapAbc('C')">C</button>
            </div>
            <button id="shoot-btn" class="btn-d" onclick="attackL2()">究極・攻撃ボタンD</button>
        </div>
    </div>

    <div id="winBoard" class="overlay" style="display:none; background:rgba(10,10,25,0.95); z-index:200;">
        <h2 style="font-size:40px; color:#facc15; margin-bottom:20px;">MISSION COMPLETE!</h2>
        <p style="font-size:18px; line-height:1.8; margin-bottom:30px;">玉村町の歴史と未来は守られた！<br>あなたはすべての守護獣を鎮めることに成功しました。</p>
        <button class="action-btn" style="background:#10b981; box-shadow:0 4px #047857;" onclick="location.href='index.html'">凱旋（マップに戻る）</button>
    </div>

    <div id="loseBoard" class="overlay" style="display:none; background:rgba(40,10,10,0.95); z-index:200;">
        <h2 style="font-size:40px; color:#ef4444; margin-bottom:20px;">作戦失敗...</h2>
        <p style="font-size:18px; line-height:1.8; margin-bottom:30px;">制限時間が経過してしまいました。<br>もう一度QRコードを読み直して挑戦してください！</p>
        <button class="action-btn" style="background:#475569; box-shadow:0 4px #334155;" onclick="location.href='index.html'">戻る</button>
    </div>

    <script>
        let hp = 20; 
        let audioCtx, bgmInterval, limitInterval;
        
        let target1 = '', target2 = ''; 
        let step = 1; 
        let limitTime = 600; 
        let cmdLimitTime = 30; 
        let gameHasStarted = false; // ゲーム開始管理フラグ

        const canvas = document.getElementById('monsterCanvas');
        const ctx = canvas.getContext('2d');

        function startL2Game() {
            if (gameHasStarted) return;
            gameHasStarted = true;

            document.getElementById('qrCheckOverlay').style.display = 'none';
            document.getElementById('mainUi').style.display = 'flex';
            
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(s => { document.getElementById('video').srcObject = s; })
                    .catch(e => { console.log("疑似AR起動"); });
            }
            
            drawMonster();
            startKuppaBgm(); // ★音楽を起動
            generateNewCommand(); 
            startLimitTimer(); 
        }

        function drawMonster() {
            const params = new URLSearchParams(window.location.search);
            const dotData = params.get('data') || "";
            ctx.clearRect(0, 0, 32, 32);
            
            let mainColor = "#facc15";
            if(dotData.includes("001FF8")) mainColor = "#ef4444";  // ゴーレム
            if(dotData.includes("0003C0")) mainColor = "#10b981";  // スネーク
            if(dotData.includes("000180")) mainColor = "#a855f7";  // サイ

            let charIndex = 0;
            for(let y=0; y<32; y++) {
                for(let x=0; x<32; x+=4) {
                    const hexChar = dotData[charIndex] || "0";
                    const num = parseInt(hexChar, 16);
                    charIndex++;
                    for(let bit=0; bit<4; bit++) {
                        const mask = 1 << (3 - bit);
                        if((num & mask) !== 0) {
                            ctx.fillStyle = mainColor;
                            ctx.fillRect(x + bit, y, 1, 1);
                        }
                    }
                }
            }
            ctx.fillStyle = "white"; ctx.fillRect(13, 10, 2, 2); ctx.fillRect(17, 10, 2, 2);
            ctx.fillStyle = "red"; ctx.fillRect(13, 10, 1, 1); ctx.fillRect(18, 10, 1, 1);
        }

        function generateNewCommand() {
            const choices = ['A', 'B', 'C'];
            target1 = choices[Math.floor(Math.random() * 3)];
            let remain = choices.filter(c => c !== target1);
            target2 = remain[Math.floor(Math.random() * 2)];
            step = 1;
            cmdLimitTime = 30; 
            resetButtonStyles();
            document.getElementById('instruction').innerHTML = `コマンドを入力せよ！<br><span style="color:#3b82f6;font-size:20px;">①【 ${target1} 】</span> ➔ ②【 ${target2} 】`;
        }

        function resetButtonStyles() {
            ['A','B','C'].forEach(l => { 
                const btn = document.getElementById(`btn-${l.toLowerCase()}`);
                if(btn) btn.className = 'abc-btn'; 
            });
            const dBtn = document.getElementById('shoot-btn');
            if(dBtn) {
                dBtn.classList.remove('ready');
                dBtn.innerText = "究極・攻撃ボタンD";
            }
        }

        function startLimitTimer() {
            limitInterval = setInterval(() => {
                limitTime--;
                cmdLimitTime--; 

                const bar = document.getElementById('limit-bar');
                const txt = document.getElementById('timer-text');
                
                if(bar) bar.style.width = `${(limitTime / 600) * 100}%`;
                if(txt) txt.innerText = (limitTime / 10).toFixed(1);

                if (cmdLimitTime <= 0) {
                    playTone(150, 'sawtooth', 0.1, 0.3);
                    generateNewCommand();
                }

                if (limitTime <= 0) {
                    clearInterval(bgmInterval); 
                    clearInterval(limitInterval);
                    document.getElementById('mainUi').style.display = 'none';
                    document.getElementById('loseBoard').style.display = 'flex';
                }
            }, 100);
        }

        function tapAbc(l) {
            if(hp <= 0 || limitTime <= 0) return;
            if (step === 1) {
                if (l === target1) {
                    step = 2;
                    document.getElementById(`btn-${l.toLowerCase()}`).classList.add('highlight1');
                    document.getElementById('instruction').innerHTML = `ナイス！次を押せ！<br>①【 ${target1} 】 ➔ <span style="color:#facc15;font-size:20px;">②【 ${target2} 】</span>`;
                    playTone(330, 'sine', 0.08, 0.2);
                } else { generateNewCommand(); }
            } else if (step === 2) {
                if (l === target2) {
                    step = 3;
                    document.getElementById(`btn-${l.toLowerCase()}`).classList.add('highlight2');
                    document.getElementById('instruction').innerHTML = "<span style='color:#10b981;font-size:18px;'>今だ！攻撃ボタンDを押せ！</span>";
                    document.getElementById('shoot-btn').classList.add('ready');
                    playTone(660, 'sine', 0.08, 0.2);
                } else { generateNewCommand(); }
            }
        }

        function attackL2() {
            if (step !== 3 || hp <= 0 || limitTime <= 0) return;
            hp -= 1; 
            document.getElementById('hp-val').innerText = hp;
            document.getElementById('flash').style.opacity = '0.5';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 50);
            canvas.classList.add('shake');
            setTimeout(() => canvas.classList.remove('shake'), 150);
            playTone(120, 'sawtooth', 0.08, 0.4);
            if (hp <= 0) {
                clearInterval(bgmInterval); 
                clearInterval(limitInterval);
                document.getElementById('mainUi').style.display = 'none';
                document.getElementById('winBoard').style.display = 'flex';
                playVictoryFanfare();
            } else { generateNewCommand(); }
        }

        function initAudio() { 
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} 
        }
        
        function playTone(freq, type, duration, volume) {
            if(!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        // ★【バグ修正箇所】条件分岐を正しく修正しました
        function startKuppaBgm() {
            // クッパ城を模した不気味なベース音の音階データ
            const bass = [110, 116, 110, 0, 98, 103, 98, 0, 87, 92, 87, 0, 73, 0, 82, 0];
            let idx = 0;
            bgmInterval = setInterval(() => {
                // 条件を修正（ゲームが始まっているならBGMを演奏する）
                if(gameHasStarted) {
                    if (bass[idx] > 0) playTone(bass[idx], 'triangle', 0.18, 0.12); 
                    idx = (idx + 1) % bass.length;
                }
            }, 140); 
        }

        function playVictoryFanfare() {
            setTimeout(() => playTone(523, 'square', 0.1, 0.1), 0);
            setTimeout(() => playTone(783, 'square', 0.6, 0.1), 300);
        }
    </script>
</body>
</html>
