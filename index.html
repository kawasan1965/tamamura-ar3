<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たまむらふぃーるど - 拠点選択マップ</title>
    <style>
        :root {
            --primary: #005088;
            --accent: #facc15;
            --dark: #0f172a;
            --blue-light: #38bdf8;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--dark); color: white; overflow: hidden; }

        /* 全画面カメラ映像エリア */
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); z-index: 2; pointer-events: none; }

        /* 玉村町の外郭白線コンテナ */
        .tamamura-map-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            height: 32vh;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .tamamura-outline {
            width: 100%;
            height: 100%;
            stroke: rgba(255, 255, 255, 0.7);
            stroke-width: 3;
            fill: rgba(255, 255, 255, 0.04);
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
        }

        /* 👑 ミニマム統合された上部HUDステータスエリア */
        .header-hud {
            position: absolute; top: 15px; left: 12px; right: 12px;
            background: rgba(15, 23, 42, 0.9); padding: 10px 15px; border-radius: 16px;
            z-index: 10; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .hud-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #94a3b8; }
        .hud-title { font-size: 15px; font-weight: bold; color: white; letter-spacing: 1px; }
        
        /* 各ステータスの値のデザイン */
        .val-pt { background: linear-gradient(135deg, #10b981, #059669); padding: 2px 10px; border-radius: 12px; color: white; font-weight: bold; font-size: 12px; }
        .val-steps { color: var(--accent); font-weight: bold; font-size: 13px; }
        .val-address { color: var(--blue-light); font-weight: bold; font-size: 11px; text-align: right; max-width: 75%; word-break: break-all; line-height: 1.3; }

        /* 歩数計ON用のミニボタン */
        .sensor-btn {
            background: #2563eb; color: white; border: none; padding: 2px 6px;
            border-radius: 5px; font-size: 9px; font-weight: bold; cursor: pointer; margin-left: 5px; vertical-align: middle;
        }

        /* ガイドメッセージ */
        .map-guide {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); padding: 6px 14px; border-radius: 20px;
            font-size: 11px; font-weight: bold; z-index: 10; border: 1px solid rgba(255,255,255,0.2);
            text-align: center; white-space: nowrap;
        }

        /* 3つのフィールドカルーセル */
        .spot-carousel {
            position: absolute; bottom: 25px; left: 0; width: 100%;
            display: flex; gap: 15px; padding: 0 20px 15px 20px;
            overflow-x: auto; scroll-snap-type: x mandatory; z-index: 10;
            -webkit-overflow-scrolling: touch;
        }
        .spot-carousel::-webkit-scrollbar { display: none; }
        
        .spot-card {
            flex: 0 0 78%; scroll-snap-align: center;
            background: rgba(15, 23, 42, 0.95); border-radius: 18px; padding: 14px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px;
        }
        .spot-icon { font-size: 32px; background: #1e293b; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 14px; border: 1px solid #334155; }
        .spot-info { flex-grow: 1; }
        .spot-info h3 { font-size: 14px; margin-bottom: 1px; color: white; }
        .spot-info p { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
        
        .battle-start-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626); color: white;
            border: none; padding: 6px 12px; font-size: 11px; font-weight: bold;
            border-radius: 6px; cursor: pointer; box-shadow: 0 3px #991b1b;
        }
        .battle-start-btn:active { transform: translateY(2px); box-shadow: 0 1px #991b1b; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <div class="overlay-mask"></div>

    <div class="header-hud">
        <div class="hud-row">
            <span class="hud-title">たまむらふぃーるど</span>
            <span class="val-pt">通算: <span id="total-points">0</span> PT</span>
        </div>
        <div class="hud-row" style="margin-top: 2px;">
            <span>🚶‍♂️ 歩数データ</span>
            <span class="val-steps">現在 <span id="today-steps">0</span> 歩<button id="sensorAuthBtn" class="sensor-btn" onclick="requestSensorPermission()">ON</button></span>
        </div>
        <div class="hud-row" style="margin-top: 2px;">
            <span>📍 現在位置</span>
            <span class="val-address" id="current-address">GPS信号を探索中...</span>
        </div>
    </div>

    <div class="tamamura-map-container">
        <svg class="tamamura-outline" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
            <path d="
                M 45,15 
                L 55,16 L 60,18 L 62,25 L 68,27 L 72,24 L 75,32 
                L 68,43 L 73,50 L 76,55 L 75,64 L 88,77 L 85,83 
                L 76,82 L 72,88 L 60,86 L 50,78 L 47,82 L 40,82 
                L 35,76 L 31,77 L 27,68 L 33,63 L 33,55 L 25,52 
                L 24,46 L 30,39 L 36,40 L 40,32 L 40,24 L 43,20 Z
            "/>
        </svg>
    </div>

    <div class="map-guide">左右にスワイプしてバトル拠点を選択 ▽</div>

    <div class="spot-carousel">
        <div class="spot-card">
            <div class="spot-icon">🌲</div>
            <div class="spot-info">
                <h3>北部公園スポット</h3>
                <p>出現：たまご竜 (LV.1)</p>
                <button class="battle-start-btn" onclick="goToBattle('北部公園', '🦖')">バトル開始</button>
            </div>
        </div>
        <div class="spot-card">
            <div class="spot-icon">🏫</div>
            <div class="spot-info">
                <h3>玉村小学校スポット</h3>
                <p>出現：わんぱく犬 (LV.1)</p>
                <button class="battle-start-btn" onclick="goToBattle('玉村小学校', '🐶')">バトル開始</button>
            </div>
        </div>
        <div class="spot-card">
            <div class="spot-icon">🌊</div>
            <div class="spot-info">
                <h3>烏川・岩倉橋スポット</h3>
                <p>出現：リバーカッパ (LV.1)</p>
                <button class="battle-start-btn" onclick="goToBattle('烏川・岩倉橋', '🥒')">バトル開始</button>
            </div>
        </div>
    </div>

    <script>
        // --- データの読み込み ---
        let stepCount = parseInt(localStorage.getItem('tamamura_steps')) || 0;
        let pts = localStorage.getItem('tamamura_total_pt') || localStorage.getItem('tamamura_points_demo') || '0';

        // 連撃判定のクールダウン用のタイマー変数
        let lastStepTime = 0;

        window.onload = function() {
            document.getElementById('total-points').innerText = pts;
            document.getElementById('today-steps').innerText = stepCount;

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
                .then(stream => { document.getElementById('video').srcObject = stream; })
                .catch(() => { console.log("カメラ非対応環境"); });

            checkSensorAvailability();
            startGpsTracking();
        };

        // --- ① 歩数計システム ---
        function checkSensorAvailability() {
            if ('DeviceMotionEvent' in window) {
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    document.getElementById('sensorAuthBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('sensorAuthBtn').style.display = 'none';
                    startCounting();
                }
            } else {
                document.getElementById('sensorAuthBtn').style.display = 'none';
            }
        }

        function requestSensorPermission() {
            DeviceMotionEvent.requestPermission()
                .then(response => {
                    if (response === 'granted') {
                        startCounting();
                        const btn = document.getElementById('sensorAuthBtn');
                        btn.innerText = "✓";
                        btn.style.background = "#10b981";
                        btn.disabled = true;
                    }
                }).catch(console.error);
        }

        // ★【大改良】全方位3次元ベクター解析 ＆ 超高感度ペドメーター
        function startCounting() {
            window.addEventListener('devicemotion', (event) => {
                if(!event.accelerationIncludingGravity) return;

                // X軸(横揺れ)・Y軸(縦揺れ)・Z軸(前後揺れ)のパワーを全て取得
                let x = event.accelerationIncludingGravity.x || 0;
                let y = event.accelerationIncludingGravity.y || 0;
                let z = event.accelerationIncludingGravity.z || 0;

                // 【物理公式】3軸の揺れの総合パワー（ベクトル強度）を計算
                let totalAcceleration = Math.sqrt(x * x + y * y + z * z);

                // 地球の静止重力（約9.8）を引き算し、純粋な「スマホが動いた力」だけを抽出
                let movementPower = Math.abs(totalAcceleration - 9.8);

                // ★感度調整：しきい値を11から「7.5」へ引き下げ、小さな揺れも確実にキャッチ
                if (movementPower > 7.5) {
                    let now = Date.now();
                    // 1歩進んだら、次の歩数までは最低0.25秒あける（連続カウント化けを防ぐ安全弁）
                    if (now - lastStepTime > 250) {
                        stepCount++;
                        document.getElementById('today-steps').innerText = stepCount;
                        localStorage.setItem('tamamura_steps', stepCount);
                        lastStepTime = now;
                    }
                }
            });
        }

        // --- ② GPS位置情報 ➔ リアルタイム「座標 ＋ 住所」結合システム ---
        function startGpsTracking() {
            if (!navigator.geolocation) {
                document.getElementById('current-address').innerText = "GPS非対応端末";
                return;
            }

            navigator.geolocation.watchPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const coordText = `[${lat.toFixed(4)}, ${lon.toFixed(4)}]`;

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ja`);
                    const data = await response.json();
                    
                    if (data && data.address) {
                        const a = data.address;
                        const city = a.city || a.town || a.village || "";
                        const suburb = a.suburb || a.neighbourhood || "";
                        const road = a.road || "";
                        const num = a.house_number || a.block_number || ""; 
                        
                        let addressText = `${city}${suburb}${road}${num}`.trim();
                        if(!addressText) addressText = "玉村町エリア";
                        
                        document.getElementById('current-address').innerText = `${coordText} ${addressText}`;
                    } else {
                        document.getElementById('current-address').innerText = `${coordText} 玉村町エリア`;
                    }
                } catch (e) {
                    document.getElementById('current-address').innerText = `${coordText} GPS同期中`;
                }
            }, (error) => {
                document.getElementById('current-address').innerText = "位置情報を許可してください";
            }, { 
                enableHighAccuracy: true, 
                timeout: 8000 
            });
        }

        function goToBattle(name, monster) {
            sessionStorage.setItem('current_battle_name', name + 'バトル');
            sessionStorage.setItem('current_battle_monster', monster);
            window.location.href = 'level1.html';
        }
    </script>
</body>
</html>
